<!DOCTYPE html>
<html lang="es">
<head><style>
@font-face {
  font-family: "Optimistic";
  font-style: normal;
  font-weight: 400 600;
  font-display: swap;
  src: url("/fonts/OptimisticAI_VF_Optimized.woff2") format("woff2");
}
@font-face {
  font-family: "Optimistic Mono";
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url("/fonts/OptimisticMono_W_TextRegular.woff2") format("woff2");
}
:where(html) {
  font-family: "Optimistic", system-ui, sans-serif;
}
:where(code, pre, kbd, samp) {
  font-family: "Optimistic Mono", ui-monospace, monospace;
}
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DND - Tienda</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
  import { getFirestore, doc, setDoc, getDoc, getDocs, collection, updateDoc, onSnapshot, query, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
  
  const firebaseConfig = {
    // PEGA TU CONFIG DE FIREBASE AQUÍ
    apiKey: "TU_API_KEY",
    authDomain: "TU_AUTH_DOMAIN",
    projectId: "TU_PROJECT_ID",
    storageBucket: "TU_STORAGE_BUCKET",
    messagingSenderId: "TU_SENDER_ID",
    appId: "TU_APP_ID"
  };
  
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  window.db = db;
  window.auth = auth;
  window.firestore = { doc, setDoc, getDoc, getDocs, collection, updateDoc, onSnapshot, query, where };
  window.firebaseAuth = { signInWithEmailAndPassword, onAuthStateChanged, signOut };
</script>
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; }
  .role-admin { display: none; }
  .role-operador { display: none; }
  body.admin .role-admin { display: block !important; }
  body.operador .role-operador { display: block !important; }
  
  .btn-triangle {
    width: 0; height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-bottom: 35px solid #FF7A00;
    background: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-triangle:hover { border-bottom-color: #E86E00; transform: scale(1.1); }
  .estrenos-banner {
    background: linear-gradient(90deg, #FF7A00 0%, #FF9A3D 100%);
    color: white; padding: 12px 20px; text-align: center; font-weight: 700;
  }
  
</style>
</head>
<body class="bg-gray-50">

  <div id="banner-estrenos" class="estrenos-banner"></div>
  <div class="max-w-6xl mx-auto p-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold">Tienda DND</h1>
      <button onclick="abrirCentroCliente()" class="bg-white border px-4 py-2 rounded">Mi Pedido</button>
    </div>
    <div id="productos-grid" class="grid md:grid-cols-3 gap-6"></div>
  </div>
  
  <!-- Modal Centro Cliente -->
  <div id="modal-cliente" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-lg p-6 max-w-md w-full">
      <h2 class="text-xl font-bold mb-4">Centro del Cliente</h2>
      <input id="codigo-pedido" placeholder="Código de pedido" class="border w-full p-2 rounded mb-3">
      <button onclick="buscarPedido()" class="bg-[#FF7A00] text-white w-full py-2 rounded mb-2">Ver Estado</button>
      <div id="estado-pedido"></div>
      <button onclick="cerrarModal()" class="mt-4 text-gray-500 text-sm">Cerrar</button>
    </div>
  </div>
  
<script type="module">

  const { doc, getDoc, getDocs, collection, setDoc, onSnapshot } = window.firestore;
  
  async function cargarBanner() {
    const banner = await getDoc(doc(db, 'config', 'banner'));
    document.getElementById('banner-estrenos').textContent = banner.data()?.texto || 'Bienvenido a DND';
  }
  
  async function cargarProductos() {
    const snap = await getDocs(collection(db, 'productos'));
    document.getElementById('productos-grid').innerHTML = snap.docs.map(d => {
      const p = d.data();
      return `<div class="bg-white rounded-lg shadow p-6">
        <h3 class="font-bold text-lg mb-2">${p.nombre}</h3>
        <p class="text-2xl font-bold text-[#FF7A00] mb-4">${p.precio} BOB</p>
        <button class="btn-triangle mx-auto block" onclick="comprar('${d.id}')"></button>
      </div>`;
    }).join('');
  }
  
  window.comprar = (id) => {
    alert('Aquí iría el checkout. Por ahora crea pedido demo.');
  };
  
  window.abrirCentroCliente = () => document.getElementById('modal-cliente').classList.remove('hidden');
  window.cerrarModal = () => document.getElementById('modal-cliente').classList.add('hidden');
  
  window.buscarPedido = async () => {
    const code = document.getElementById('codigo-pedido').value;
    const pedido = await getDoc(doc(db, 'pedidos', code));
    if(pedido.exists()) {
      const p = pedido.data();
      document.getElementById('estado-pedido').innerHTML = `
        <div class="border-l-4 border-[#FF7A00] pl-4">
          <p><b>Estado:</b> ${p.estado}</p>
          <p><b>Producto:</b> ${p.producto}</p>
          ${p.link_descarga ? `<a href="${p.link_descarga}" target="_blank" class="text-[#FF7A00] underline">Descargar</a>` : ''}
        </div>`;
    } else {
      document.getElementById('estado-pedido').innerHTML = '<p class="text-red-500">No encontrado</p>';
    }
  };
  
  cargarBanner();
  cargarProductos();
  
</script>
<script>(function(){var loc=location.href.replace(/#.*$/,"");var ATTR_NAMES=["data-product-id","data-productid","data-product_id","product-id","productid","product_id","data-source-entity-id","source-entity-id","source_entity_id","data-product","data-metadata","data-meta"];var DATASET_KEYS=["productId","productid","product_id","sourceEntityId","sourceentityid","source_entity_id","product","metadata","meta"];function readProductId(value){if(typeof value!=="string"||value.length===0)return null;if(/^[0-9]{6,}$/.test(value))return value;var match=value.match(/(?:product(?:_|-)?id|source(?:_|-)?entity(?:_|-)?id)["'=:\s]+([0-9]{6,})/i);return match?match[1]:null}function extractProductId(start){for(var node=start;node&&node!==document.body;node=node.parentElement){for(var i=0;i<ATTR_NAMES.length;i++){var attrValue=node.getAttribute&&node.getAttribute(ATTR_NAMES[i]);var attrProductId=readProductId(attrValue);if(attrProductId)return attrProductId}var dataset=node.dataset||null;if(dataset){for(var j=0;j<DATASET_KEYS.length;j++){var dataValue=dataset[DATASET_KEYS[j]];var dataProductId=readProductId(dataValue);if(dataProductId)return dataProductId}}}return null}document.addEventListener("click",function(e){var target=e.target instanceof Element?e.target:null;if(!target)return;var a=target.closest?target.closest("a[href]"):null;if(!a||!a.href||!/^https?:\/\//.test(a.href))return;if(a.href.replace(/#.*$/,"")===loc)return;var productId=extractProductId(target)||extractProductId(a);if(!productId)return;e.preventDefault();parent.postMessage({type:"ecto-artifact-link-click",productId:productId},"*")},true)})();</script></body>
</html>
